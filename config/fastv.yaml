defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .

vlm:
  _target_: model.Selection.FastV.vlm.FastVVLM
  model_id: "llava-hf/llava-1.5-7b-hf"
  backend: "llava"
  dtype: "bf16"
  quantization:
    enabled: true
    mode: "4bit"
    skip_vision_encoder: true
    skip_modules: []
    kwargs:
      bnb_4bit_compute_dtype: "bf16"
      bnb_4bit_quant_type: "nf4"
      bnb_4bit_use_double_quant: true
      llm_int8_threshold: 6.0
      llm_int8_enable_fp32_cpu_offload: false
  patch_selector: null
  fastv_config:
    use_fastv: true
    fastv_k: 3 # patch selection 계층 선택
    fastv_r: 0.9 # 전체 토큰 중 제거 토큰 비율
  image_max_side: null
  processor_kwargs: {}
  model_kwargs:
    device_map: "cuda:0"
  local_model_dir: "./model/repo"
  generation_kwargs:
    do_sample: false
    max_new_tokens: 10
    use_cache: true

invoke:
  task: "vqa"
  image_path: "./data/image.png"
  prompt_file: "model/prompt.txt"
  query_file: "model/query.txt"
  print_config: false
  quiet_model_loading: true
