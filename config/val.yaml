defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .

print_config: false

experiment: "base" # VQAv2 val 로컬 평가에 사용할 모델 config

egoschema_val:
  input_file: "./eval/result/ego_pred.jsonl"
  url: "https://validation-server.onrender.com/api/upload/"
  timeout: 120
  dry_run: false

nextqa_val:
  input_file: "./eval/result/nextqa_pred.jsonl"
  dataset_root: "/content/drive/MyDrive/NExTVideo/nextqa"
  questions_file: "/content/drive/MyDrive/NExTVideo/nextqa/val.csv"

videomme_val:
  results_file: "./eval/result/videomme_results.json"

vqav2:
  dataset_root: "/home/data/VQAv2"
  split: "val"
  require_answers: true
  prompt_file: "prompts/vqav2.txt"
  output_dir: "./eval/result"
  output_file: "./eval/result/vqav2_val_eval.jsonl"
  resume: false
  start_index: 0
  limit: null
  eval_batch_size: 36
  empty_cuda_cache_interval: 0
